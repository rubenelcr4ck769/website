<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Ruben Ignacio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      z-index: 1000;
    }
    .logo {
      background: #cfd8dc;
      color: #000;
      font-weight: bold;
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 6px;
    }
    .nav-links {
      display: flex;
      gap: 1rem;
    }
    .nav-links a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    .nav-links a:hover {
      color: #bb86fc;
    }

    /* HAMBURGUESA (oculta en desktop) */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }
    .hamburger div {
      width: 25px;
      height: 3px;
      background: #fff;
      border-radius: 5px;
    }

    /* Menú móvil */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        right: 10px;
        background: #1e1e1e;
        flex-direction: column;
        gap: 0;
        border-radius: 8px;
        overflow: hidden;
      }
      .nav-links a {
        padding: 10px 20px;
        border-bottom: 1px solid #333;
      }
      .nav-links.show {
        display: flex;
      }
      .hamburger {
        display: flex;
      }
    }

    /* Para que el contenido no quede debajo de la navbar */
    .content {
      padding-top: 80px;
    }

    /* Secciones */
    .presentacion {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 3rem;
    }
    .presentacion img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 3px solid #bb86fc;
    }
    .texto {
      max-width: 600px;
    }
    .texto h1 {
      color: #bb86fc;
      font-size: 3rem;
      margin: 0;
    }
    .texto p {
      font-size: 1.3rem;
      color: #aaa;
      margin: 1rem 0;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      margin-top: 10px;
      background: #bb86fc;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #9a67ea;
    }

    section {
      padding: 2rem;
    }
    h2 {
      color: #bb86fc;
      margin-bottom: 1rem;
      font-size: 2rem;
    }

    /* Juegos */
    .juegos {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .juego-card {
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      width: 300px;
      text-align: center;
      transition: transform 0.3s;
    }
    .juego-card:hover {
      transform: scale(1.05);
    }
    .juego-card img {
      width: 100%;
      height: auto;
    }
    .juego-card a {
      display: block;
      padding: 10px;
      background: #292929;
      color: #bb86fc;
      text-decoration: none;
      font-weight: bold;
      border-top: 1px solid #333;
    }

    /* Lenguajes */
    .lenguajes {
      padding: 2rem;
      text-align: center;
    }
    .lenguajes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .lenguajes-grid a {
      display: inline-block;
    }
    .lenguajes-grid img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .lenguajes-grid img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #bb86fc;
    }

    /* Scroll suave */
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav>
    <div class="logo">RUBEN</div>
    <div class="hamburger" id="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="proyectos.html">Proyectos</a>
      <a href="https://www.youtube.com/@RUBENELCRACK" target="_blank">YouTube</a>
      <a href="Sobremi.html">Sobre mí</a>
      <a href="contacto.html">Contacto</a>
      
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="content">
    <!-- Presentación -->
    <div class="presentacion" id="sobre-mi">
      <img src="imagenes/yo.PNG" alt="Foto de Ruben Ignacio">
      <div class="texto">
        <h1>RUBEN IGNACIO</h1>
        <p>Soy programador con experiencia en <b>C</b>, <b>C++</b>, <b>HTML</b> y <b>Arduino</b>. Me apasiona crear juegos y todo tipo de proyectos.</p>
        <a href="https://www.youtube.com/@RUBENELCRACK" target="_blank" class="btn">CANAL DE YT</a>
      </div>
    </div>

    <!-- Juegos -->
    <section id="juegos">
      <h2>Mis Proyectos</h2>
      <div class="juegos">
        <div class="juego-card">
          <img src="imagenes/pong.PNG" alt="Mi Juego">
          <a href="https://play.google.com/store/apps/details?id=com.clecloespindola.pongmobile" target="_blank">Ver en Google Play</a>
        </div>
      </div>
    </section>

    <!-- Lenguajes -->
    <section class="lenguajes">
      <h2>Lenguajes que manejo</h2>
      <div class="lenguajes-grid">
        <a href="https://en.cppreference.com/w/c" target="_blank">
          <img src="imagenes/C_Logo.png" alt="Logo C">
        </a>
        <a href="https://isocpp.org/" target="_blank">
          <img src="imagenes/ISO_C++_Logo.svg (1).png" alt="Logo C++">
        </a>
        <a href="https://developer.mozilla.org/es/docs/Web/HTML" target="_blank">
          <img src="imagenes/html.png" alt="Logo HTML">
        </a>
        <a href="https://www.arduino.cc/" target="_blank">
          <img src="imagenes/arduino.png" alt="Logo Arduino">
        </a>
      </div>
    </section>
  </div>

  <!-- Script menú hamburguesa -->
  <script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("nav-links");

    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("show");
    });
  </script>
</body>
</html>
